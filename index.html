<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div id='main'>
        <div id="main-screen">0</div>
        <div id="button-screen">
            <button class="button func top" id="AC">C</button>
            <button class="button func top" id="+/-">+/-</button>
            <button class="button func top" id="%">%</button>
            <button class="button func right" id="÷">÷</button>
            <button class="button num" id="7">7</button>
            <button class="button num" id="8">8</button>
            <button class="button num" id="9">9</button>
            <button class="button func right" id="*">×</button>
            <button class="button num" id="4">4</button>
            <button class="button num" id="5">5</button>
            <button class="button num" id="6">6</button>
            <button class="button func right" id="-">-</button>
            <button class="button num" id="1">1</button>
            <button class="button num" id="2">2</button>
            <button class="button num" id="3">3</button>
            <button class="button func right" id="+">+</button>
            <button class="button num" id="zero">0</button>
            <button class="button num" id=".">.</button>
            <button class="button func right" id="=">=</button></div>
        </div>
    <script src="script.js"></script>
</body>
</html>
